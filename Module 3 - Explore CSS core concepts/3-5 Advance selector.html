<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced CSS Selectors</title>
    <link rel="stylesheet" href="./style/style5.css">

</head>
<body>

    <h2>Advanced CSS Selectors</h2>

    <input type="text" placeholder="Your Name">
    <br><br>

    <input type="checkbox" checked> Accept Terms
    <br><br>

    <input type="text" value="Disabled Input" disabled>
    <br><br>

    <button>Hover Me</button>

    <hr>

    <a href="https://google.com">Google</a><br>
    <a href="http://example.org">Example</a><br>

    <hr>

    <img src="logo.png" alt="Logo" width="120">

    <hr>

    <ul>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ul>

    <hr>

    <p>Lorem ipsum dolor sit amet.</p>
    <p class="special">This is Special Paragraph.</p>
    <p>Another Paragraph.</p>

    <hr>

    <div></div>

</body>
</html>
