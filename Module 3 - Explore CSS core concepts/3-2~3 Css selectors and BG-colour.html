<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Selectors Example</title>
    <link rel="stylesheet" href="./style/style2.css">
</head>
<body>

    <!-- Element Selector -->
    <h1>Element Selector</h1>

    <!-- Class Selector -->
    <h2 class="title">Class Selector</h2>

    <!-- ID Selector -->
    <div id="header">
        ID Selector
    </div>

    <!-- Descendant Selector -->
    <div class="container">
        <p>Descendant Selector</p>
    </div>

    <!-- Child Selector -->
    <div class="box">
        <p>Child Selector</p>
        <div>
            <p>This is NOT a direct child.</p>
        </div>
    </div>

    <!-- Adjacent Sibling Selector -->
    <h3>Adjacent Sibling</h3>
    <p>This paragraph is selected.</p>

    <!-- General Sibling Selector -->
    <h4>General Sibling</h4>
    <span>Span Element</span>
    <p>Paragraph 1</p>
    <p>Paragraph 2</p>

    <!-- Attribute Selector -->
    <input type="text" placeholder="Enter your name">

    <br><br>

    <!-- Hover Selector -->
    <button>Hover Me</button>

    <br><br>

    <!-- Pseudo Class -->
    <input type="text" placeholder="Focus on me">

    <!-- First, Last, nth-child -->
    <ul>
        <li>First Item</li>
        <li>Second Item</li>
        <li>Third Item</li>
    </ul>

    <!-- Pseudo Element -->
    <p class="demo">
        Pseudo Element Example
    </p>

</body>
</html>
