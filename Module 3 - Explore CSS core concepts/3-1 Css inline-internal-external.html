<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Types</title>
    <link rel="stylesheet" href="./style/style1.css">

   
    <!-- 2. Internal CSS -->
    
    <style>
        .internal {
            color: green;
            font-size: 35px;
        }
    </style>

   
    <!-- 3. External CSS -->
    
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <!-- 1. Inline CSS -->
    <h1 style="color: blue; font-size: 35px;">
        This is Inline CSS
    </h1>

    <!-- 2. Internal CSS -->
    <h1 class="internal">
        This is Internal CSS
    </h1>

    <!-- 3. External CSS -->
    <h1 class="external">
        This is External CSS
    </h1>

</body>
</html>
