<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Display & Visibility</title>

    <style>

        /* Body */

        body{
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            padding: 30px;
        }

        /* Heading */

        h1{
            text-align: center;
            margin-bottom: 30px;
        }

        /* Section */

        .section{
            background: white;
            padding: 20px;
            margin-bottom: 30px;
            border-radius: 10px;
        }

        /* Common Box */

        .box{
            background: steelblue;
            color: white;
            padding: 15px;
            margin: 10px;
            border: 2px solid black;
        }

        /* Block Example */

        .block{
            display: block;
            width: 250px;
        }

        /* Inline Example */

        .inline{
            display: inline;
            background: orange;
        }

        /* Inline Block Example */

        .inline-block{
            display: inline-block;
            width: 150px;
            height: 80px;
            background: green;
            text-align: center;
            line-height: 50px;
        }

        /* Visibility */

        .hidden{
            visibility: hidden;
        }

    </style>

</head>
<body>

    <h1>CSS Display & Visibility</h1>

    <!-- Block -->

    <div class="section">

        <h2>Display: Block</h2>

        <div class="box block">Block 1</div>

        <div class="box block">Block 2</div>

    </div>

    <!-- Inline -->

    <div class="section">

        <h2>Display: Inline</h2>

        <span class="box inline">HTML</span>

        <span class="box inline">CSS</span>

        <span class="box inline">JavaScript</span>

    </div>

    <!-- Inline Block -->

    <div class="section">

        <h2>Display: Inline-Block</h2>

        <div class="box inline-block">Box 1</div>

        <div class="box inline-block">Box 2</div>

        <div class="box inline-block">Box 3</div>

    </div>

    <!-- Visibility -->

    <div class="section">

        <h2>Visibility</h2>

        <div class="box">
            Visible Box
        </div>

        <div class="box hidden">
            Hidden Box
        </div>

        <div class="box">
            This box does not move because the hidden box still takes up space.
        </div>

    </div>

</body>
</html>
