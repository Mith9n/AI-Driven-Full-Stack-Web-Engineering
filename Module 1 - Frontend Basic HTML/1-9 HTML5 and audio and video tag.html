<!-- HTML Video Tag -->

<video controls width="400" poster="thumb.jpg">

    <source src="movie.mp4" type="video/mp4">

    Your browser does not support video.

</video>


Explanation:

<video>
- Creates a video player on a webpage.

controls
- Shows video buttons:
  Play, Pause, Volume, Full Screen

width="400"
- Sets video width to 400 pixels.

poster="thumb.jpg"
- Shows an image before the video starts (thumbnail).

<source>
- Adds the video file.

src="movie.mp4"
- Video file location/name.

type="video/mp4"
- Defines the video format.

Fallback text:
Your browser does not support video.
- Shows when the browser cannot play the video.

<!-- HTML Audio Tag -->

<audio controls>

    <source src="music.mp3" type="audio/mp3">

    Your browser does not support audio.

</audio>


Explanation:

<audio>
- Adds an audio player.

controls
- Shows audio controls:
  Play, Pause, Volume

source
- Adds the audio file.

src="music.mp3"
- Audio file location/name.

type="audio/mp3"
- Defines the audio format.

Fallback text:
Your browser does not support audio.
- Shows when the browser cannot play audio.
